
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Fullscreen Vimeo Mobile</title>

<script src="https://player.vimeo.com/api/player.js"></script>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  touch-action: manipulation;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

#overlay {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 24px;
  font-family: sans-serif;
  background: black;
  z-index: 10;
}

#video {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  border: none;
  display: none;
  background: black;
}
</style>
</head>

<body>

<div id="overlay">
  ▶️ Tocca per avviare il video
</div>

<iframe
  id="video"
  allow="autoplay; fullscreen; picture-in-picture"
  allowfullscreen
  webkitallowfullscreen
  mozallowfullscreen>
</iframe>

<script>
const overlay = document.getElementById("overlay");
const iframe = document.getElementById("video");

async function startVideo() {

  overlay.style.display = "none";

  iframe.style.display = "block";

  iframe.src =
    "https://player.vimeo.com/video/1189496532" +
    "?autoplay=1" +
    "&muted=0" +
    "&playsinline=0" +
    "&title=0" +
    "&byline=0" +
    "&portrait=0";

  const player = new Vimeo.Player(iframe);

  try {

    // attende caricamento player
    await player.ready();

    // tenta audio attivo
    await player.setMuted(false);
    await player.setVolume(1);

    // play
    await player.play();

  } catch (e) {
    console.log("Audio autoplay bloccato dal browser:", e);
  }

  // fullscreen immediato
  try {

    if (iframe.requestFullscreen) {
      await iframe.requestFullscreen();
    } else if (iframe.webkitRequestFullscreen) {
      iframe.webkitRequestFullscreen();
    } else if (iframe.webkitEnterFullscreen) {
      iframe.webkitEnterFullscreen();
    }

  } catch (e) {
    console.log("Fullscreen non disponibile:", e);
  }
}

document.body.addEventListener(
  "click",
  startVideo,
  { once: true }
);
</script>

</body>
</html>
